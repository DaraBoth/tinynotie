# fly.toml app configuration file generated for tinynotie-api on 2026-03-04T11:06:24Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tinynotie-api'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  TELEGRAM_WEBHOOK_ASYNC = 'true'
  OPENAI_CALL_TIMEOUT_MS = '30000'
  AI_MAX_TOOL_ITERATIONS = '12'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 50
    hard_limit = 75

  [[http_service.checks]]
    grace_period = '20s'
    interval = '30s'
    method = 'get'
    timeout = '5s'
    path = '/healthz'

[deploy]
  strategy = 'rolling'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
